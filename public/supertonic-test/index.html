<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Supertonic TTS — Isolated Browser Test</title>
<style>
  :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
  body { max-width: 820px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
  h1 { margin-bottom: .25rem; }
  .sub { opacity: .7; margin-top: 0; font-size: .95rem; }
  fieldset { border: 1px solid #8884; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
  legend { padding: 0 .5rem; font-weight: 600; }
  label { display: block; margin: .5rem 0 .25rem; font-size: .9rem; }
  select, input, textarea, button {
    font: inherit; padding: .5rem; border-radius: 6px; border: 1px solid #8884;
    width: 100%; box-sizing: border-box; background: transparent; color: inherit;
  }
  textarea { min-height: 100px; resize: vertical; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
  button#go {
    background: #2563eb; color: white; border: 0; cursor: pointer;
    padding: .75rem; font-weight: 600; margin-top: 1rem;
  }
  button#go:disabled { opacity: .5; cursor: not-allowed; }
  #status { padding: .75rem; border-radius: 6px; background: #8881; font-size: .9rem; font-family: ui-monospace, monospace; white-space: pre-wrap; }
  #status.error { background: #ef44441f; color: #c00; }
  #status.ok { background: #22c55e1f; }
  #badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; background: #8883; margin-left: .5rem; }
  audio { width: 100%; margin-top: .75rem; }
  .stats { display: flex; gap: 1rem; font-size: .85rem; opacity: .8; margin-top: .5rem; }
  code { background: #8882; padding: 1px 4px; border-radius: 3px; }
</style>

<script type="importmap">
{
  "imports": {
    "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.bundle.min.mjs"
  }
}
</script>
</head>
<body>
  <h1>Supertonic TTS <span id="badge">loading…</span></h1>
  <p class="sub">Isolated client-side test. Models load from <code>huggingface.co/Supertone/supertonic-3</code> via ONNX Runtime Web (WebGPU → WASM fallback). No server inference.</p>

  <div id="status">Booting…</div>

  <fieldset>
    <legend>Input</legend>
    <label for="voice">Voice</label>
    <select id="voice">
      <option value="M1">Male 1 (M1)</option>
      <option value="M2">Male 2</option>
      <option value="M3">Male 3</option>
      <option value="F1">Female 1</option>
      <option value="F2">Female 2</option>
      <option value="F3">Female 3</option>
    </select>

    <div class="row">
      <div>
        <label for="lang">Language</label>
        <select id="lang">
          <option value="en" selected>English</option>
          <option value="ko">Korean</option>
          <option value="ja">Japanese</option>
          <option value="de">German</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="it">Italian</option>
        </select>
      </div>
      <div>
        <label for="steps">Denoise steps</label>
        <input id="steps" type="number" value="8" min="1" max="50" />
      </div>
      <div>
        <label for="speed">Speed</label>
        <input id="speed" type="number" value="1.05" min="0.5" max="2.0" step="0.05" />
      </div>
    </div>

    <label for="text">Text</label>
    <textarea id="text">Hello! This is an isolated test of Supertonic text to speech running entirely in your browser. Pretty cool, right?</textarea>

    <button id="go" disabled>Generate speech</button>
  </fieldset>

  <fieldset>
    <legend>Output</legend>
    <div id="out">Generated audio will appear here.</div>
  </fieldset>

  <script type="module" src="./main.js"></script>
</body>
</html>
